        <!-- CONTENT -->

        <div id="content-wrapper" class="d-flex flex-column">

            <div id="content">

                <!-- TOPBAR -->

                <nav class="navbar navbar-expand navbar-light topbar mb-4 static-top shadow">

                    <button id="menuToggleMobile" class="btn d-md-none mr-3">

                        <i class="fas fa-bars"></i>

                    </button>

                    <h5 class="m-0 font-weight-bold text-dark">

                        <i class="fas fa-building text-primary mr-2"></i>

                        Configuração da Empresa

                    </h5>

                </nav>

                <div class="container-fluid">

                    <!-- DADOS EMPRESA -->

                    <div class="card shadow-sm mb-4">

                        <div class="card-header">

                            <strong>

                                <i class="fas fa-building mr-2"></i>

                                Dados da Empresa

                            </strong>

                        </div>

                        <div class="card-body">

                            <form id="formEmpresa">

                                <div class="form-row">

                                    <div class="col-md-6 mb-3">

                                        <label>Razão Social</label>

                                        <input type="text" id="nome" class="form-control">

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label>Nome Fantasia</label>

                                        <input type="text" id="nomeFantasia" class="form-control">

                                    </div>

                                    <div class="col-md-4 mb-3">

                                        <label>CNPJ</label>

                                        <input type="text" id="cnpj" class="form-control">

                                    </div>

                                    <div class="col-md-4 mb-3">

                                        <label>Inscrição Estadual</label>

                                        <input type="text" id="inscricaoEstadual" class="form-control">

                                    </div>

                                    <div class="col-md-4 mb-3">

                                        <label>Inscrição Municipal</label>

                                        <input type="text" id="inscricaoMunicipal" class="form-control">

                                    </div>

                                    <div class="col-md-4 mb-3">

                                        <label>Telefone</label>

                                        <input type="text" id="telefone" class="form-control">

                                    </div>

                                    <div class="col-md-4 mb-3">

                                        <label>Email</label>

                                        <input type="email" id="email" class="form-control">

                                    </div>

                                    <div class="col-md-4 mb-3">

                                        <label>CEP</label>

                                        <input type="text" id="cep" class="form-control">

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label>Endereço</label>

                                        <input type="text" id="endereco" class="form-control">

                                    </div>

                                    <div class="col-md-2 mb-3">

                                        <label>Número</label>

                                        <input type="text" id="numero" class="form-control">

                                    </div>

                                    <div class="col-md-4 mb-3">

                                        <label>Complemento</label>

                                        <input type="text" id="complemento" class="form-control">

                                    </div>

                                    <div class="col-md-4 mb-3">

                                        <label>Bairro</label>

                                        <input type="text" id="bairro" class="form-control">

                                    </div>

                                    <div class="col-md-3 mb-3">

                                        <label>Cidade</label>

                                        <input type="text" id="cidade" class="form-control">

                                    </div>

                                    <div class="col-md-2 mb-3">

                                        <label>UF</label>

                                        <input type="text" maxlength="2" id="estado" class="form-control">

                                    </div>

                                    <div class="col-md-3 mb-3">

                                        <label>CRT</label>

                                        <select id="crt" class="form-control">

                                            <option value="1">
                                                Simples Nacional
                                            </option>

                                            <option value="2">
                                                Simples Excesso Sublimite
                                            </option>

                                            <option value="3">
                                                Regime Normal
                                            </option>

                                        </select>

                                    </div>

                                </div>

                            </form>

                        </div>

                    </div>

                    <!-- CONFIGURAÇÃO FISCAL -->

                    <div class="card shadow-sm mb-4">

                        <div class="card-header">

                            <strong>

                                <i class="fas fa-file-invoice-dollar mr-2"></i>

                                Configuração Fiscal

                            </strong>

                        </div>

                        <div class="card-body">

                            <form id="formFiscal">

                                <div class="form-row">

                                    <div class="col-md-3 mb-3">

                                        <label>Ambiente</label>

                                        <select id="ambiente" class="form-control">

                                            <option value="HOMOLOGACAO">
                                                Homologação
                                            </option>

                                            <option value="PRODUCAO">
                                                Produção
                                            </option>

                                        </select>

                                    </div>

                                    <div class="col-md-3 mb-3">

                                        <label>Série NF-e</label>

                                        <input type="number" id="serieNfe" class="form-control">

                                    </div>

                                    <div class="col-md-3 mb-3">

                                        <label>Série NFC-e</label>

                                        <input type="number" id="serieNfce" class="form-control">

                                    </div>

                                    <div class="col-md-3 mb-3">

                                        <label>Próxima NF-e</label>

                                        <input type="number" id="proximoNumeroNfe" class="form-control">

                                    </div>

                                    <div class="col-md-3 mb-3">

                                        <label>Próxima NFC-e</label>

                                        <input type="number" id="proximoNumeroNfce" class="form-control">

                                    </div>

                                    <div class="col-md-9 mb-3">

                                        <label>Token API Fiscal</label>

                                        <input type="text" id="tokenApi" class="form-control">

                                    </div>

                                </div>

                            </form>

                        </div>

                    </div>

                    <div class="text-right mb-5">

                        <button class="btn btn-success btn-lg" id="btnSalvarEmpresa">

                            <i class="fas fa-save mr-2"></i>

                            Salvar Configurações

                        </button>

                    </div>

                </div>

            </div>

        </div>
