            <!-- DASHBOARD -->

                    <i class="fas fa-fw fa-tachometer-alt"></i>

            <!-- RELATORIO -->
            <li class="nav-item">

                </a>

            </li>

        </ul>

        <!-- CONTENT -->
        <div id="content-wrapper" class="d-flex flex-column">

            <div id="content">

                <!-- TOPBAR -->
                <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">

                    <!-- MENU MOBILE -->
                    <button id="menuToggleMobile">

                        <i class="fas fa-bars"></i>

                    </button>

                    <h5 class="m-0 font-weight-bold text-dark ml-3">

                        <i class="fa fa-university text-danger mr-2"></i>

                        Movimentações do Caixa

                    </h5>

                </nav>

                <!-- FORM -->
                <div class="container-fluid mb-4">

                    <div class="card shadow-sm">

                        <div class="card-body">

                            <h5 class="mb-3">

                                <i class="fas fa-plus-circle text-danger"></i>

                                Nova Movimentação

                            </h5>

                            <form id="caixaForm" class="form-row" autocomplete="off">

                                <!-- TIPO -->
                                <div class="col-md-4 mb-2">

                                    <label>Tipo de Operação</label>

                                    <select name="tipoOperacao" id="tipoOperacao" class="form-control" required>

                                        <option value="">Selecione...</option>

                                        <option value="ENTRADA">Entrada</option>

                                        <option value="SAIDA">Saída</option>

                                    </select>

                                </div>

                                <!-- PAGAMENTO -->
                                <div class="col-md-4 mb-2">

                                    <label>Meio de Pagamento</label>

                                    <select name="meioPagamento" id="meioPagamento" class="form-control" required>

                                        <option value="">Selecione...</option>

                                        <option value="PIX">Pix</option>

                                        <option value="CARTAO">Cartão</option>

                                        <option value="DINHEIRO">Dinheiro</option>

                                        <option value="BOLETO">Boleto</option>

                                        <option value="TRANSFERENCIA">Transferência</option>

                                    </select>

                                </div>

                                <!-- VALOR -->
                                <div class="col-md-4 mb-2">

                                    <label>Valor (R$)</label>

                                    <input type="number" step="0.01" name="valor" id="valor" class="form-control"
                                        required>

                                </div>

                                <!-- DATA -->
                                <div class="col-md-4 mb-2">

                                    <label>Data</label>

                                    <input type="date" name="dataOperacao" id="dataOperacao" class="form-control"
                                        required>

                                </div>

                                <!-- CLIENTE -->
                                <div class="col-md-4 mb-2">

                                    <label>Cliente</label>

                                    <select name="clienteId" id="clienteId" class="form-control">

                                        <option value="">Sem cliente</option>

                                    </select>

                                </div>

                                <!-- JUROS -->
                                <div class="col-md-4 mb-2">

                                    <label>Juros Máquina</label>

                                    <input type="number" step="0.01" name="jurosMaquina" id="jurosMaquina"
                                        class="form-control">

                                </div>

                                <!-- DESCRIÇÃO -->
                                <div class="col-md-12 mb-2">

                                    <label>Descrição</label>

                                    <input type="text" name="descricao" id="descricao" class="form-control" required>

                                </div>

                                <!-- BOTAO -->
                                <div class="col-md-12 text-right mt-3">

                                    <button type="submit" class="btn btn-danger px-4">

                                        <i class="fas fa-save"></i>

                                        Salvar Movimentação

                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

                <!-- FILTROS -->
                <div class="container-fluid mb-4">

                    <div class="card shadow-sm">

                        <div class="card-body">

                            <h5 class="mb-3">

                                <i class="fas fa-filter text-danger"></i>

                                Filtros de Pesquisa

                            </h5>

                            <div class="form-row">

                                <!-- TIPO -->
                                <div class="col-md-3 mb-2">

                                    <label>Tipo de Operação</label>

                                    <select id="filtroTipo" class="form-control">

                                        <option value="">Todas</option>

                                        <option value="ENTRADA">Entradas</option>

                                        <option value="SAIDA">Saídas</option>

                                    </select>

                                </div>

                                <!-- DATA INICIO -->
                                <div class="col-md-3 mb-2">

                                    <label>Data Inicial</label>

                                    <input type="date" id="filtroInicio" class="form-control">

                                </div>

                                <!-- DATA FIM -->
                                <div class="col-md-3 mb-2">

                                    <label>Data Final</label>

                                    <input type="date" id="filtroFim" class="form-control">

                                </div>

                                <!-- LIMPAR -->
                                <div class="col-md-3 mb-2 d-flex align-items-end">

                                    <button id="btnLimparFiltros" class="btn btn-outline-secondary w-100">

                                        <i class="fas fa-undo"></i>

                                        Limpar Filtros

                                    </button>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- LISTAGEM -->
                <div class="container-fluid mb-5">

                    <h5 class="mb-3">

                        <i class="fas fa-list"></i>

                        Movimentações Registradas

                    </h5>

                    <div id="listaOperacoes"></div>

                </div>

            </div>

        </div>

    </div>

    <!-- JS -->
