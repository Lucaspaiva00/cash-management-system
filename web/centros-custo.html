<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Centros de Custo</title>

    <link href="vendor2/fontawesome-free/css/all.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="css2/sb-admin-2.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/centros-custo.css">

</head>

<body>

    <div class="container-fluid mt-4">

        <div class="card shadow">

            <div class="card-body">

                <h4>

                    <i class="fas fa-sitemap text-danger"></i>

                    Centros de Custo

                </h4>

                <form id="formCentro">

                    <input type="hidden" id="centroId">

                    <div class="form-row">

                        <div class="col-md-9">

                            <label>Nome</label>

                            <input type="text" id="nome" class="form-control" required>

                        </div>

                        <div class="col-md-3 d-flex align-items-end">

                            <button class="btn btn-danger w-100">

                                Salvar

                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

        <div class="card shadow mt-4">

            <div class="card-body">

                <table class="table">

                    <thead>

                        <tr>

                            <th>Nome</th>

                            <th width="150">
                                Ações
                            </th>

                        </tr>

                    </thead>

                    <tbody id="listaCentros">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="js/centros-custo.js"></script>

</body>

</html>
