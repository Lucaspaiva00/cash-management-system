            <hr class="sidebar-divider my-0" />

                </a>
            </li>

            <hr class="sidebar-divider" />
            <div class="sidebar-heading">Páginas</div>

            <li class="nav-item">
                <a class="nav-link" href="movimentacoes.html">
                    <i class="fa fa-university"></i>

                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="pdvvenda.html">

            <li class="nav-item">
                <a class="nav-link" href="agenda.html">
                    <i class="fas fa-cash-register"></i>
                    <span>Agenda</span>
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="vendas.html">
                    <i class="fas fa-chart-line"></i>
                    <span>Relatório de Vendas</span>
                </a>
            </li>

            <li class="nav-item">

                    <i class="fas fa-file-invoice"></i>
                    <span>Propostas</span>
                </a>
            </li>

                    <i class="fas fa-sign-out-alt"></i>

            <hr class="sidebar-divider d-none d-md-block" />

                <button class="rounded-circle border-0" id="sidebarToggle"></button>
            </div>
        </ul>

        <!-- Conteúdo -->
        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">
                    <h5 class="m-0 font-weight-bold text-dark">Gerenciamento de Clientes</h5>
                </nav>

                <!-- Card de Adicionar Cliente -->
                <div class="container-fluid mb-4">
                    <div class="card card-clientes shadow-sm">
                        <div class="card-header d-flex align-items-center">
                            <i class="fas fa-user-plus text-primary mr-2"></i>
                            <h5 class="mb-0">Adicionar Cliente</h5>
                        </div>

                        <div class="card-body">
                            <form id="caixaForms">
                                <div class="form-row">
                                    <div class="form-group col-md-4">
                                        <label>Nome do Cliente</label>
                                        <input type="text" name="nome" class="form-control" placeholder="Nome completo"
                                            required />
                                    </div>
                                    <div class="form-group col-md-4">
                                        <label>CPF</label>
                                        <input type="text" name="cpf" class="form-control"
                                            placeholder="000.000.000-00" />
                                    </div>
                                    <div class="form-group col-md-4">
                                        <label>CNPJ</label>
                                        <input type="text" name="cnpj" class="form-control"
                                            placeholder="00.000.000/0000-00" />
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group col-md-6">
                                        <label>Endereço</label>
                                        <input type="text" name="endereco" class="form-control"
                                            placeholder="Rua, número, bairro..." />
                                    </div>
                                    <div class="form-group col-md-6">
                                        <label>Telefone</label>
                                        <input type="text" name="telefone" class="form-control"
                                            placeholder="(00) 00000-0000" />
                                    </div>
                                    <div class="form-group col-md-6">
                                        <label>E-mail</label>
                                        <input type="email" name="email" class="form-control"
                                            placeholder="email@empresa.com" />
                                    </div>
                                </div>

                                <!-- Novos campos solicitados -->
                                <div class="form-row">
                                    <div class="form-group col-md-4">
                                        <label>Serviço</label>
                                        <input type="text" name="servico" class="form-control"
                                            placeholder="Ex: Manutenção, instalação, banho em pet..." />
                                    </div>

                                    <div class="form-group col-md-4">
                                        <label>Tipo de Serviço mais detalhado</label>
                                        <select name="porteCachorro" class="form-control">
                                            <option value="">Selecione...</option>
                                            <option value="Pequeno">Pequeno</option>
                                            <option value="Médio">Médio</option>
                                            <option value="Grande">Grande</option>
                                            <option value="Gigante">Gigante</option>
                                        </select>
                                    </div>

                                    <div class="form-group col-md-4">
                                        <label>Descrição</label>
                                        <input type="text" name="descricao" class="form-control"
                                            placeholder="Observações do cliente..." />
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group col-md-6">
                                        <div class="checkbox-card">
                                            <input type="checkbox" name="pacoteQuinzenal" id="pacoteQuinzenal" />
                                            <label for="pacoteQuinzenal">Pacote quinzenal</label>
                                        </div>
                                    </div>

                                    <div class="form-group col-md-6">
                                        <div class="checkbox-card">
                                            <input type="checkbox" name="pacoteMensal" id="pacoteMensal" />
                                            <label for="pacoteMensal">Pacote mensal</label>
                                        </div>
                                    </div>
                                </div>

                                <div class="text-right mt-3">
                                    <button type="submit" class="btn btn-success px-4 py-2 shadow-sm">
                                        <i class="fas fa-save mr-1"></i> Salvar Cliente
                                    </button>
                                    <button type="reset" class="btn btn-light border px-4 py-2 ml-2">Cancelar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Lista de Clientes -->
                <div class="container-fluid">
                    <h5 class="mb-3"><i class="fas fa-users"></i> Clientes Cadastrados</h5>
                    <div id="clientesCadastrados"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="vendor2/jquery/jquery.min.js"></script>
    <script src="vendor2/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="vendor2/jquery-easing/jquery.easing.min.js"></script>
    <script src="js/scriptClientes.js"></script>
    <script src="js/menu.js"></script>
</body>
