<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Categorias Financeiras</title>

    <link href="vendor2/fontawesome-free/css/all.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="css2/sb-admin-2.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/categorias-financeiras.css">

</head>

<body>

    <div class="container-fluid mt-4">

        <div class="card shadow">

            <div class="card-body">

                <h4 class="mb-4">

                    <i class="fas fa-tags text-danger"></i>

                    Categorias Financeiras

                </h4>

                <form id="formCategoria">

                    <input type="hidden" id="categoriaId">

                    <div class="form-row">

                        <div class="col-md-5">

                            <label>Nome</label>

                            <input type="text" id="nome" class="form-control" required>

                        </div>

                        <div class="col-md-4">

                            <label>Tipo</label>

                            <select id="tipo" class="form-control">

                                <option value="ENTRADA">
                                    Entrada
                                </option>

                                <option value="SAIDA">
                                    Saída
                                </option>

                            </select>

                        </div>

                        <div class="col-md-3 d-flex align-items-end">

                            <button class="btn btn-danger w-100">

                                Salvar

                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

        <div class="card shadow mt-4">

            <div class="card-body">

                <table class="table table-hover">

                    <thead>

                        <tr>

                            <th>Nome</th>

                            <th>Tipo</th>

                            <th width="150">Ações</th>

                        </tr>

                    </thead>

                    <tbody id="listaCategorias">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="js/categorias-financeiras.js"></script>

</body>

</html>
